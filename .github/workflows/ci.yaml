name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.x
      - run: flutter --version
      - run: dart pub get
      - run: dart analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.x
      - run: dart pub get
      - run: flutter test
        working-directory: manyui
      - run: flutter test
        working-directory: manyui_testing
      - run: flutter test
        working-directory: manyui_hooks
      - run: flutter test
        working-directory: manyui_riverpod
      - run: flutter test
        working-directory: manyui_board

  publish_dry_run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - manyui
          - manyui_assets
          - manyui_board
          - manyui_cli
          - manyui_compat_forui
          - manyui_hooks
          - manyui_riverpod
          - manyui_testing
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.x
      - run: dart pub get
      - run: dart pub publish --dry-run
        working-directory: ${{ matrix.package }}

  floor_check:
    name: Verify against SDK floor (3.24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.x
      - run: flutter --version
      - run: dart pub get
      - run: dart analyze
      - run: flutter test
        working-directory: manyui

name: manyui
description: A Flutter UI component library that works on web, mobile, and desktop with minimal dependencies and no required MaterialApp.
version: 0.1.1
homepage: https://github.com/sneurlax/manyui
repository: https://github.com/sneurlax/manyui
issue_tracker: https://github.com/sneurlax/manyui/issues

environment:
  flutter: ">=3.27.0"
  sdk: ">=3.6.0 <4.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  meta: ^1.16.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  manyui_testing: any

flutter:
  uses-material-design: false
